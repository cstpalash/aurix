name: Aurix Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  aurix-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Aurix
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Restore Aurix State
        uses: actions/cache@v4
        with:
          path: .aurix/data
          key: aurix-state-${{ github.repository }}-${{ github.ref }}
          restore-keys: |
            aurix-state-${{ github.repository }}-
      
      - name: Run Aurix Code Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m aurix.actions.run \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --action review
      
      - name: Save Aurix State
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .aurix/data
          key: aurix-state-${{ github.repository }}-${{ github.ref }}-${{ github.run_id }}
